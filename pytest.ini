[pytest]
# ------------------------------------------------------------
# Test discovery
# ------------------------------------------------------------
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ------------------------------------------------------------
# Asyncio configuration
# ------------------------------------------------------------
# Ensures pytest-asyncio uses modern asyncio mode
asyncio_mode = auto

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
# Prevent pytest from capturing your logger output unless needed
log_cli = false
log_level = INFO

# ------------------------------------------------------------
# Warnings
# ------------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# ------------------------------------------------------------
# Coverage integration
# ------------------------------------------------------------
addopts =
    --strict-markers
    --maxfail=1
    --disable-warnings
    --cov=LogSmith
    --cov-report=term-missing
    --cov-report=html
